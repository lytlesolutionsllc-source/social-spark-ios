name: iOS Build

on:
  push:
    branches: ["main", "mvp-checkpoint-**", "feature/**", "bugfix/**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show schemes
        run: xcodebuild -list -project SocialSpark.xcodeproj

      - name: Build SocialSpark (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project SocialSpark.xcodeproj \
            -scheme SocialSpark \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            clean build | xcpretty
